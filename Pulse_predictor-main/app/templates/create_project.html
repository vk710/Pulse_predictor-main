{% extends "base.html" %}
{% block title %}Create Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Create New Project</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/projects/create">
                    <div class="row">
                        <div class="col-md-{% if managers %}8{% else %}12{% endif %} mb-3">
                            <label for="name" class="form-label">Project Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="Enter project name">
                        </div>
                        {% if managers %}
                        <div class="col-md-4 mb-3">
                            <label for="manager_id" class="form-label">Assign Manager</label>
                            <select class="form-select" id="manager_id" name="manager_id">
                                <option value="0">-- Myself --</option>
                                {% for m in managers %}
                                <option value="{{ m.id }}">{{ m.name }} ({{ m.role }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}
                    </div>

                    <hr>
                    <h5 class="text-muted mb-3">Financial Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="planned_cost" class="form-label">Baseline Gross Billing ($)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="planned_cost" name="planned_cost" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="actual_cost" class="form-label">Latest Gross Billing ($)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="actual_cost" name="actual_cost" value="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="baseline_rpp" class="form-label">Baseline RPP</label>
                            <input type="number" step="0.01" class="form-control" id="baseline_rpp" name="baseline_rpp" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="latest_rpp" class="form-label">Latest RPP</label>
                            <input type="number" step="0.01" class="form-control" id="latest_rpp" name="latest_rpp" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="dollar_impact" class="form-label">$ Impact</label>
                            <input type="number" step="0.01" class="form-control" id="dollar_impact" name="dollar_impact" value="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="project_margin_baseline" class="form-label">Baseline Margin %</label>
                            <input type="number" step="0.001" class="form-control" id="project_margin_baseline" name="project_margin_baseline" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="project_margin_latest" class="form-label">Latest Margin %</label>
                            <input type="number" step="0.001" class="form-control" id="project_margin_latest" name="project_margin_latest" value="0">
                        </div>
                    </div>

                    <hr>
                    <h5 class="text-muted mb-3">Effort & Resources</h5>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="planned_effort" class="form-label">Baseline Effort (Person Months)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="planned_effort" name="planned_effort" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="actual_effort" class="form-label">Latest Effort (Person Months)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="actual_effort" name="actual_effort" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="resource_count" class="form-label">Resource Count</label>
                            <input type="number" min="1" class="form-control" id="resource_count" name="resource_count" value="1">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="onsite_mix_pct" class="form-label">Onsite Mix %</label>
                            <input type="number" step="0.01" min="0" max="1" class="form-control" id="onsite_mix_pct" name="onsite_mix_pct" value="0">
                        </div>
                    </div>

                    <hr>
                    <h5 class="text-muted mb-3">Timeline & Classification</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_date" class="form-label">Start Date</label>
                            <input type="date" class="form-control" id="start_date" name="start_date">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="end_date" class="form-label">End Date</label>
                            <input type="date" class="form-control" id="end_date" name="end_date">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="mcc" class="form-label">MCC (Client)</label>
                            <input type="text" class="form-control" id="mcc" name="mcc" placeholder="e.g., APPLE">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="service_line" class="form-label">Service Line</label>
                            <input type="text" class="form-control" id="service_line" name="service_line" placeholder="e.g., ENG, ADM">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="segment" class="form-label">Segment</label>
                            <input type="text" class="form-control" id="segment" name="segment" placeholder="e.g., CRL, SURE">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="service_offering" class="form-label">Service Offering</label>
                            <select class="form-select" id="service_offering" name="service_offering">
                                <option value="">-- Select --</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Non Maintenance">Non Maintenance</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="contract_type" class="form-label">Contract Type</label>
                            <input type="text" class="form-control" id="contract_type" name="contract_type" placeholder="e.g., FP" value="FP">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="tech_stack" class="form-label">Tech Stack</label>
                            <input type="text" class="form-control" id="tech_stack" name="tech_stack" placeholder="e.g., Python/FastAPI">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Active" selected>Active</option>
                                <option value="Overrun">Overrun</option>
                                <option value="Underrun">Underrun</option>
                                <option value="Completed">Completed</option>
                                <option value="On Hold">On Hold</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a href="/projects" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Cancel</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
